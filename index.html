<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พื้นที่ทบทวนความรู้สึก</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;

  /* 🌤 พื้นหลัง */
  background: url("bg.png") no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;

  /* ✨ fade-in */
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 🧊 กล่องโปร่งแสง */
.card {
  width: 90%;
  max-width: 520px;
  padding: 30px;

  border-radius: 25px;

  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  text-align: center;
}

/* 💗 หัวข้อ */
h1 {
  margin: 0;
  font-size: 28px;
  color: #2c3e50;
}

.subtitle {
  color: #5d6d7e;
  margin: 10px 0 20px;
}

/* 🔴 กล่องแจ้งเตือน */
.warning {
  background: rgba(255,255,255,0.6);
  padding: 12px;
  border-radius: 14px;
  color: #c0392b;
  margin-bottom: 15px;
}

/* 📝 ช่องพิมพ์ */
textarea {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  border: none;
  padding: 15px;
  font-size: 16px;

  background: rgba(255,255,255,0.6);
  outline: none;
}

/* 🎀 ปุ่ม */
button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;

  background: linear-gradient(135deg,#7aa7ff,#ff9ed2);
  color: white;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* 💬 ข้อความ */
#msg {
  margin-top: 10px;
  color: #27ae60;
}

/* 💗 ไอคอนหัวใจ */
.heart {
  font-size: 30px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">
  <div class="heart">💗</div>

  <h1>พื้นที่ทบทวนความรู้สึก</h1>
  <p class="subtitle">ให้คุณได้กลับมาฟังความรู้สึกของตัวเองอย่างอ่อนโยน</p>

  <div class="warning">
    ระบบนี้ไม่บันทึกข้อความ กรุณาหลีกเลี่ยงข้อมูลส่วนตัว
  </div>

  <textarea id="text" placeholder="พิมพ์ความรู้สึกของคุณ..."></textarea>

  <button onclick="send()">💗 ส่งข้อความ</button>

  <p id="msg"></p>
</div>

<script>
function send() {
  document.getElementById("text").value = "";
  document.getElementById("msg").innerHTML = "ขอบคุณที่ดูแลความรู้สึกของตัวเอง 💙";
}
</script>

</body>
</html>
